name: CI

on:
  push:
  pull_request:
  workflow_dispatch:

permissions: {}

jobs:
  test:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 22
          cache: npm

      # The runner's default Firefox is a snap, which geckodriver/Selenium cannot
      # drive reliably. Install a real Firefox tarball instead.
      - uses: browser-actions/setup-firefox@0bc507ddf224827e3b1af68e014d5e42ab93e795 # v1.7.2
        id: firefox
        with:
          firefox-version: latest

      - run: ${{ steps.firefox.outputs.firefox-path }} --version

      - run: npm ci

      - run: npm run typecheck

      # Selenium Manager auto-provisions geckodriver at runtime (network needed).
      # FIREFOX_BIN points the harness at the Firefox installed above.
      - name: Run tests (headless Firefox via Selenium)
        run: npm test
        env:
          FIREFOX_BIN: ${{ steps.firefox.outputs.firefox-path }}

  required-status-check:
    name: ci.required-status-check
    needs:
    - test
    # GitHub Actions skips this job when any of the dependents fail. And skips
    # are considered success in their weird logic. So we always run it and fail
    # ourselves if necessary
    if: always()
    runs-on: ubuntu-latest
    steps:
    - run: echo "Use this job as the required status check of this workflow"
    - name: Check that all jobs were successful
      env:
        RESULTS: ${{ toJSON(needs) }}
      run: |
        echo "$RESULTS" | jq --exit-status 'all(.result == "success")' || exit 1
